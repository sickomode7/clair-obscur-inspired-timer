<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Expedition 33 — Temporal Rite</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600;900&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#080604;--parchment:#e8dfc8;--sepia:#c9a96e;--sepia-dark:#8a6830;
  --rust:#9b4a2a;--rust-bright:#c45c30;--white-soft:#f5f0e8;
  --border:rgba(201,169,110,0.28);--border-bright:rgba(201,169,110,0.6);
  --dim:rgba(201,169,110,0.42);--xp-gold:#d4a843;
  --hp-green:#62b87a;--ap-blue:#6a9bcf;
}
html,body{width:100%;height:100%;background:var(--ink);color:var(--parchment);font-family:'Cormorant Garamond',serif;overflow:hidden}
/* bg */
#bg{position:fixed;inset:0;z-index:0}
/* particles */
#pc{position:fixed;inset:0;pointer-events:none;z-index:4}
/* overlays */
.vig{position:fixed;inset:0;background:radial-gradient(ellipse 90% 85% at 50% 50%,transparent 25%,rgba(0,0,0,0.85) 100%);pointer-events:none;z-index:5}
.grain{position:fixed;inset:0;pointer-events:none;z-index:6;opacity:.3;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.88' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.07'/%3E%3C/svg%3E")}
/* bars */
.bar{position:fixed;left:0;right:0;height:48px;background:rgba(4,3,2,.94);z-index:50;backdrop-filter:blur(6px)}
.bar-top{top:0;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 1.25rem}
.bar-bot{bottom:0;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:center;gap:2rem;padding:0 1.25rem}
.btit{font-family:'Cinzel',serif;font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:var(--sepia);opacity:.75}
.bclk{font-family:'Cinzel',serif;font-size:11px;letter-spacing:.2em;color:var(--sepia)}
/* layout */
.layout{position:fixed;top:48px;bottom:48px;left:0;right:0;display:grid;grid-template-columns:1fr 340px;z-index:20}
/* timer panel */
.tpanel{display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;border-right:1px solid var(--border);padding:1.2rem;gap:.55rem;overflow:hidden}
.cor{position:absolute;width:44px;height:44px;border-color:var(--sepia-dark);border-style:solid;opacity:.55}
.ctL{top:14px;left:14px;border-width:1px 0 0 1px}.ctR{top:14px;right:14px;border-width:1px 1px 0 0}
.cbL{bottom:14px;left:14px;border-width:0 0 1px 1px}.cbR{bottom:14px;right:14px;border-width:0 1px 1px 0}
/* level badge */
.lvl-row{display:flex;align-items:center;gap:10px}
.lvl-hex{width:36px;height:36px;background:rgba(201,169,110,.08);border:1px solid var(--sepia-dark);clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .3s}
.lvl-hex.pop{animation:hpop .6s ease-out}
@keyframes hpop{0%{background:rgba(212,168,67,.85);transform:scale(1.4)}100%{background:rgba(201,169,110,.08);transform:scale(1)}}
.lvl-n{font-family:'Cinzel',serif;font-size:14px;font-weight:600;color:var(--sepia)}
.lvl-nm{font-family:'IM Fell English',serif;font-size:12px;font-style:italic;color:var(--dim)}
/* stat bars */
.sbars{width:min(270px,82vw);display:flex;flex-direction:column;gap:5px}
.srow{display:flex;align-items:center;gap:7px}
.slbl{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.18em;color:var(--dim);width:18px;flex-shrink:0}
.sout{flex:1;height:5px;background:rgba(255,255,255,.05);border:.5px solid rgba(201,169,110,.18);overflow:hidden;position:relative}
.sin{height:100%;transition:width .9s cubic-bezier(.4,0,.2,1);position:relative}
.sin::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:rgba(255,255,255,.25)}
.hp{background:linear-gradient(90deg,#2d6b40,var(--hp-green))}
.ap{background:linear-gradient(90deg,#2d4a7a,var(--ap-blue))}
.xp{background:linear-gradient(90deg,#7a5010,var(--xp-gold))}
.sval{font-family:'Cinzel',serif;font-size:8px;color:var(--sepia);width:38px;text-align:right;flex-shrink:0}
/* portrait ring */
.pring{position:relative;width:min(260px,54vw);height:min(260px,54vw);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.psvg{position:absolute;inset:0;width:100%;height:100%}
.rout{fill:none;stroke:rgba(201,169,110,.12);stroke-width:.5}
.rmid{fill:none;stroke:rgba(201,169,110,.06);stroke-width:.4}
.rprog{fill:none;stroke:var(--sepia-dark);stroke-width:1;stroke-linecap:butt;transition:stroke-dashoffset .65s linear,stroke .4s}
.rprog.warn{stroke:#d4903a}.rprog.urg{stroke:var(--rust-bright);animation:rpulse .85s ease-in-out infinite}
@keyframes rpulse{0%,100%{opacity:1}50%{opacity:.35}}
.tdisp{font-family:'Cinzel',serif;font-size:clamp(42px,8.5vw,88px);font-weight:600;color:var(--white-soft);letter-spacing:.05em;line-height:1;transition:color .4s;user-select:none;text-align:center}
.tdisp.warn{color:#d4a030}.tdisp.urg{color:var(--rust-bright);animation:turg .8s ease-in-out infinite}
@keyframes turg{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.7;transform:scale(.97)}}
.tsub{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.32em;text-transform:uppercase;color:var(--dim);margin-top:4px;text-align:center;transition:opacity .4s}
/* ornament divider */
.odiv{display:flex;align-items:center;gap:8px;width:min(250px,82vw)}
.oline{flex:1;height:1px;background:var(--border)}.ogem{width:6px;height:6px;border:1px solid var(--sepia-dark);transform:rotate(45deg);flex-shrink:0}
/* preset */
.prow{display:flex;gap:5px;flex-wrap:wrap;justify-content:center}
.pbtn{font-family:'Cinzel',serif;font-size:8px;letter-spacing:.18em;padding:4px 11px;background:transparent;border:1px solid var(--border);color:var(--dim);cursor:pointer;transition:all .2s;clip-path:polygon(5px 0%,100% 0%,calc(100% - 5px) 100%,0% 100%)}
.pbtn:hover{border-color:var(--sepia-dark);color:var(--parchment);background:rgba(201,169,110,.07)}
.pbtn.ap{border-color:var(--sepia);color:var(--sepia)}
/* set row */
.setrow{display:flex;gap:6px;align-items:center}
.tin{width:46px;background:transparent;border:none;border-bottom:1px solid var(--border-bright);color:var(--parchment);font-family:'Cinzel',serif;font-size:14px;text-align:center;padding:3px 0;outline:none;transition:border-color .2s}
.tin:focus{border-bottom-color:var(--sepia)}
.tsep{font-family:'Cinzel',serif;font-size:16px;color:var(--sepia-dark)}
.sbtn{font-family:'Cinzel',serif;font-size:8px;letter-spacing:.15em;padding:5px 11px;background:transparent;border:1px solid var(--border);color:var(--dim);cursor:pointer;transition:all .2s;clip-path:polygon(5px 0%,100% 0%,calc(100% - 5px) 100%,0% 100%)}
.sbtn:hover{border-color:var(--sepia-dark);color:var(--parchment)}
/* controls */
.ctrls{display:flex;gap:7px}
.btn{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.2em;text-transform:uppercase;padding:9px 18px;background:transparent;border:1px solid var(--border-bright);color:var(--parchment);cursor:pointer;transition:all .2s;clip-path:polygon(7px 0%,100% 0%,calc(100% - 7px) 100%,0% 100%);position:relative;overflow:hidden}
.btn::after{content:'';position:absolute;inset:0;background:rgba(201,169,110,0);transition:background .2s}
.btn:hover::after{background:rgba(201,169,110,.08)}.btn:active{transform:scale(.96)}.btn.pri{border-color:var(--sepia);color:var(--white-soft)}.btn:disabled{opacity:.3;cursor:not-allowed}
/* session gems */
.sgrow{display:flex;align-items:center;gap:7px}
.sglbl{font-family:'Cinzel',serif;font-size:8px;letter-spacing:.2em;color:var(--dim)}
.sgem{width:7px;height:7px;border:1px solid var(--sepia-dark);transform:rotate(45deg);transition:all .4s;flex-shrink:0}
.sgem.lit{background:var(--sepia-dark);box-shadow:0 0 6px rgba(201,169,110,.55)}
.sgem.pop{animation:gpop .5s ease-out}
@keyframes gpop{0%{transform:rotate(45deg) scale(2.2);opacity:.5}100%{transform:rotate(45deg) scale(1)}}
/* quest panel */
.qpanel{display:flex;flex-direction:column;overflow:hidden;background:rgba(4,3,2,.72)}
.qhdr{padding:.9rem 1.2rem .7rem;border-bottom:1px solid var(--border)}
.qhtit{font-family:'Cinzel',serif;font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:var(--sepia);margin-bottom:.55rem;display:flex;align-items:center;gap:8px}
.qhtit::after{content:'';flex:1;height:1px;background:var(--border)}
.qarow{display:flex;gap:6px}
.qin{flex:1;background:transparent;border:none;border-bottom:1px solid var(--border);color:var(--parchment);font-family:'IM Fell English',serif;font-size:13px;padding:5px 0;outline:none;transition:border-color .2s}
.qin::placeholder{color:var(--dim);font-style:italic}.qin:focus{border-bottom-color:var(--sepia-dark)}
.abtn{font-family:'Cinzel',serif;font-size:8px;letter-spacing:.15em;padding:5px 11px;background:transparent;border:1px solid var(--border);color:var(--dim);cursor:pointer;transition:all .2s;white-space:nowrap}
.abtn:hover{border-color:var(--sepia);color:var(--sepia)}
.qlist{flex:1;overflow-y:auto;padding:.2rem 0;scrollbar-width:thin;scrollbar-color:var(--sepia-dark) transparent}
.qi{display:flex;align-items:flex-start;gap:9px;padding:9px 1.2rem;border-bottom:1px solid rgba(201,169,110,.055);cursor:pointer;transition:background .15s,opacity .3s;position:relative;overflow:hidden}
.qi::before{content:'';position:absolute;left:0;top:0;bottom:0;width:0;background:rgba(201,169,110,.04);transition:width .2s}
.qi:hover::before{width:100%}.qi.done{opacity:.38}
.qi.cmp{animation:qcmp .5s ease-out}
@keyframes qcmp{0%{background:rgba(201,169,110,.14)}100%{background:transparent}}
.qchk{width:13px;height:13px;flex-shrink:0;border:1px solid var(--sepia-dark);transform:rotate(45deg);margin-top:2px;display:flex;align-items:center;justify-content:center;transition:all .25s}
.qi.done .qchk{background:var(--sepia-dark);border-color:var(--sepia)}
.qchi{width:5px;height:5px;background:var(--parchment);opacity:0;transition:opacity .2s}.qi.done .qchi{opacity:1}
.qtxt{font-family:'IM Fell English',serif;font-size:13px;line-height:1.45;color:var(--parchment);flex:1;transition:color .2s;position:relative;z-index:1}
.qi.done .qtxt{text-decoration:line-through;color:var(--dim)}
.qxp{font-family:'Cinzel',serif;font-size:8px;letter-spacing:.1em;color:var(--xp-gold);opacity:.65;flex-shrink:0;margin-top:3px;z-index:1;position:relative}
.qi.done .qxp{opacity:.25}
.qdel{opacity:0;width:16px;height:16px;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--sepia-dark);cursor:pointer;transition:opacity .15s,color .15s;flex-shrink:0;z-index:1;position:relative}
.qi:hover .qdel{opacity:1}.qdel:hover{color:var(--rust)}
.qfoot{padding:.55rem 1.2rem;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.qcnt{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.2em;color:var(--dim)}
.clrbtn{font-family:'Cinzel',serif;font-size:8px;letter-spacing:.15em;background:none;border:none;color:var(--dim);cursor:pointer;transition:color .2s;padding:3px 0}
.clrbtn:hover{color:var(--rust)}
.qorn{text-align:center;font-size:13px;color:var(--sepia-dark);opacity:.38;padding:.35rem 0;user-select:none}
/* bottom bar */
.bstat{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.22em;color:var(--dim);text-transform:uppercase;white-space:nowrap}
.bstat span{color:var(--sepia);margin-left:4px}
.tabsw{display:none;align-items:center;gap:9px}
.tabbtn{font-family:'Cinzel',serif;font-size:8px;letter-spacing:.2em;text-transform:uppercase;background:none;border:none;color:var(--dim);cursor:pointer;padding:3px 0;border-bottom:1px solid transparent;transition:all .2s}
.tabbtn.active{color:var(--sepia);border-bottom-color:var(--sepia-dark)}
/* floating numbers */
.xpf{position:fixed;font-family:'Cinzel',serif;font-size:20px;font-weight:600;color:var(--xp-gold);pointer-events:none;z-index:200;text-shadow:0 0 18px rgba(212,168,67,.85);animation:xprise 1.8s ease-out forwards}
@keyframes xprise{0%{opacity:1;transform:translateY(0) scale(1.1)}60%{opacity:1;transform:translateY(-55px) scale(1.05)}100%{opacity:0;transform:translateY(-95px) scale(.8)}}
.cmpf{position:fixed;font-family:'IM Fell English',serif;font-size:13px;font-style:italic;pointer-events:none;z-index:200;animation:cmprise 1.5s ease-out forwards}
@keyframes cmprise{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-50px)}}
/* toast */
.toast{position:fixed;bottom:58px;left:50%;transform:translateX(-50%) translateY(14px);background:rgba(6,4,3,.97);border:1px solid var(--border-bright);padding:8px 20px;font-family:'Cinzel',serif;font-size:9px;letter-spacing:.22em;color:var(--sepia);text-transform:uppercase;opacity:0;pointer-events:none;transition:opacity .3s,transform .3s;z-index:300;clip-path:polygon(7px 0%,100% 0%,calc(100% - 7px) 100%,0% 100%);white-space:nowrap;max-width:90vw;text-align:center}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
/* level-up overlay */
.luov{position:fixed;inset:0;z-index:400;display:flex;align-items:center;justify-content:center;pointer-events:none;opacity:0;transition:opacity .4s}
.luov.on{opacity:1}
.lubox{text-align:center;padding:1.8rem 3rem;border:1px solid var(--sepia);background:rgba(6,4,3,.96);clip-path:polygon(14px 0%,100% 0%,calc(100% - 14px) 100%,0% 100%)}
.lutop{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.4em;text-transform:uppercase;color:var(--dim);margin-bottom:.4rem}
.lunum{font-family:'Cinzel',serif;font-size:52px;font-weight:900;color:var(--xp-gold);line-height:1;text-shadow:0 0 40px rgba(212,168,67,.6);animation:lunpop .5s ease-out}
@keyframes lunpop{0%{transform:scale(.5);opacity:0}70%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
.lunm{font-family:'IM Fell English',serif;font-size:17px;font-style:italic;color:var(--parchment);margin-top:.2rem}
.lusub{font-family:'Cinzel',serif;font-size:8px;letter-spacing:.3em;color:var(--dim);margin-top:.65rem;text-transform:uppercase}
/* mobile */
@media(max-width:700px){
  .bar,.bar-top,.bar-bot{height:44px}
  .layout{top:44px;bottom:44px;grid-template-columns:1fr;grid-template-rows:1fr}
  .tpanel,.qpanel{position:absolute;inset:0;transition:transform .38s cubic-bezier(.4,0,.2,1),opacity .3s}
  .tpanel{transform:translateX(0);opacity:1;border-right:none}
  .qpanel{transform:translateX(100%);opacity:0}
  .layout.sq .tpanel{transform:translateX(-100%);opacity:0}
  .layout.sq .qpanel{transform:translateX(0);opacity:1}
  .tabsw{display:flex}
  .bstat:first-child{display:none}
  .pring{width:min(210px,63vw);height:min(210px,63vw)}
  .sbars{width:min(230px,86vw)}
}
</style>
</head>
<body>

<canvas id="bg"></canvas>
<canvas id="pc"></canvas>
<div class="vig"></div>
<div class="grain"></div>

<div class="bar bar-top">
  <span class="btit">Expedition 33 — Temporal Rite</span>
  <span style="font-size:15px;color:var(--sepia-dark)">✦</span>
  <span class="bclk" id="bclk">00:00:00</span>
</div>

<div class="layout" id="layout">

  <!-- TIMER PANEL -->
  <div class="tpanel">
    <div class="cor ctL"></div><div class="cor ctR"></div>
    <div class="cor cbL"></div><div class="cor cbR"></div>

    <div class="lvl-row">
      <div class="lvl-hex" id="lhex"><span class="lvl-n" id="lnum">1</span></div>
      <span class="lvl-nm" id="lname">Wanderer</span>
    </div>

    <div class="sbars">
      <div class="srow"><span class="slbl">HP</span><div class="sout"><div class="sin hp" id="hpb" style="width:100%"></div></div><span class="sval" id="hpv">100</span></div>
      <div class="srow"><span class="slbl">AP</span><div class="sout"><div class="sin ap" id="apb" style="width:0%"></div></div><span class="sval" id="apv">0</span></div>
      <div class="srow"><span class="slbl">XP</span><div class="sout"><div class="sin xp" id="xpb" style="width:0%"></div></div><span class="sval" id="xpv">0</span></div>
    </div>

    <div class="pring">
      <svg class="psvg" viewBox="0 0 200 200">
        <g id="ticks"></g>
        <circle class="rout" cx="100" cy="100" r="95"/>
        <circle class="rmid" cx="100" cy="100" r="90"/>
        <circle class="rprog" id="rprog" cx="100" cy="100" r="85"
          stroke-dasharray="534" stroke-dashoffset="0" transform="rotate(-90 100 100)"/>
        <circle class="rmid" cx="100" cy="100" r="72"/>
      </svg>
      <div style="display:flex;flex-direction:column;align-items:center">
        <div class="tdisp" id="tdisp">25:00</div>
        <div class="tsub" id="tsub">Focus</div>
      </div>
    </div>

    <div class="prow" id="prow">
      <button class="pbtn" data-s="300">5m</button>
      <button class="pbtn" data-s="600">10m</button>
      <button class="pbtn ap" data-s="1500">25m</button>
      <button class="pbtn" data-s="2700">45m</button>
      <button class="pbtn" data-s="3600">1h</button>
    </div>

    <div class="setrow">
      <input class="tin" id="imin" type="number" min="0" max="99" value="25">
      <span class="tsep">:</span>
      <input class="tin" id="isec" type="number" min="0" max="59" value="00">
      <button class="sbtn" id="sbtn">Set</button>
    </div>

    <div class="ctrls">
      <button class="btn pri" id="stbtn">Begin</button>
      <button class="btn" id="psbtn" disabled>Pause</button>
      <button class="btn" id="rsbtn">Reset</button>
    </div>

    <div class="odiv"><div class="oline"></div><div class="ogem"></div><div class="oline"></div></div>

    <div class="sgrow">
      <span class="sglbl">Sessions</span>
      <div id="sgems" style="display:flex;gap:5px"></div>
    </div>
  </div>

  <!-- QUEST PANEL -->
  <div class="qpanel">
    <div class="qhdr">
      <div class="qhtit">Quest Board</div>
      <div class="qarow">
        <input class="qin" id="qin" type="text" placeholder="Add a new objective…" maxlength="120">
        <button class="abtn" id="addbtn">+ Enlist</button>
      </div>
    </div>
    <div class="qorn">· · ✦ · ·</div>
    <div class="qlist" id="qlist"></div>
    <div class="qfoot">
      <span class="qcnt" id="qcnt">0 remaining</span>
      <button class="clrbtn" id="clrbtn">Clear done</button>
    </div>
  </div>
</div>

<div class="bar bar-bot">
  <span class="bstat">Day <span id="sday">1</span></span>
  <span class="bstat">Elapsed <span id="selap">0s</span></span>
  <span class="bstat">Done <span id="sdone">0</span></span>
  <div class="tabsw" id="tabsw">
    <button class="tabbtn active" id="ttimer">Timer</button>
    <span style="color:var(--sepia-dark);font-size:10px">✦</span>
    <button class="tabbtn" id="tquest">Quests</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="luov" id="luov">
  <div class="lubox">
    <div class="lutop">Level Attained</div>
    <div class="lunum" id="lunum">2</div>
    <div class="lunm" id="lunm">Chronicler</div>
    <div class="lusub">The Painter takes notice</div>
  </div>
</div>

<script>
// ── PAINTED SKY ──
(function(){
  const c=document.getElementById('bg'),ctx=c.getContext('2d');
  let W,H,stars=[];
  function mkstars(){
    stars=[];
    for(let i=0;i<140;i++) stars.push({x:Math.random(),y:Math.random()*.72,r:.25+Math.random()*.7,a:.2+Math.random()*.55,tw:Math.random()*Math.PI*2,ts:.0008+Math.random()*.002});
  }
  function draw(t){
    c.width=W=innerWidth; c.height=H=innerHeight;
    const sky=ctx.createLinearGradient(0,0,0,H);
    sky.addColorStop(0,'#07050d'); sky.addColorStop(.35,'#100c18');
    sky.addColorStop(.65,'#180c08'); sky.addColorStop(1,'#080604');
    ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);
    // mist layers
    [[.15,.22,.18],[.55,.3,.14],[.85,.18,.16],[.3,.45,.1],[.7,.4,.12]].forEach(([fx,fy,fr],i)=>{
      const x=W*fx,y=H*fy,r=W*fr;
      const g=ctx.createRadialGradient(x,y,0,x,y,r);
      g.addColorStop(0,`rgba(${50+i*12},${30+i*8},${60+i*5},.14)`);
      g.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=g; ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
    });
    // horizon amber
    const hor=ctx.createRadialGradient(W*.5,H*.62,0,W*.5,H*.62,W*.52);
    hor.addColorStop(0,'rgba(110,60,15,.14)'); hor.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=hor; ctx.fillRect(0,0,W,H);
    // stars
    stars.forEach(s=>{
      const twinkle=.7+.3*Math.sin(s.tw+(t||0)*s.ts);
      ctx.beginPath(); ctx.arc(s.x*W,s.y*H,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(240,228,205,${s.a*twinkle})`; ctx.fill();
    });
  }
  let last=0;
  function loop(t){ if(t-last>16000){last=t; requestAnimationFrame(loop); return;} draw(t); requestAnimationFrame(loop); }
  mkstars(); draw(0);
  // gentle star twinkle loop
  let af; function tloop(t){draw(t); af=requestAnimationFrame(tloop);} tloop(0);
  window.addEventListener('resize',()=>{mkstars();draw(0);});
})();

// ── PARTICLES ──
const pc=document.getElementById('pc'),pctx=pc.getContext('2d');
let pts=[];
function resizePC(){pc.width=innerWidth;pc.height=innerHeight;}
resizePC(); window.addEventListener('resize',resizePC);

function spawnPts(x,y,col,n=8){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,sp=.8+Math.random()*3.5;
    pts.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-1.2,life:1,dec:.016+Math.random()*.018,sz:1.5+Math.random()*2.5,col});
  }
}
function ploop(){
  pctx.clearRect(0,0,pc.width,pc.height);
  // ambient motes
  if(Math.random()<.12) pts.push({x:Math.random()*innerWidth,y:innerHeight,vx:(Math.random()-.5)*.35,vy:-(0.25+Math.random()*.4),life:1,dec:.003+Math.random()*.002,sz:.8+Math.random()*1.2,col:'rgba(201,169,110,.55)'});
  pts=pts.filter(p=>p.life>0);
  pts.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy; p.vy-=.038; p.life-=p.dec;
    pctx.save(); pctx.globalAlpha=p.life; pctx.fillStyle=p.col;
    pctx.beginPath(); pctx.arc(p.x,p.y,p.sz,0,Math.PI*2); pctx.fill(); pctx.restore();
  });
  requestAnimationFrame(ploop);
}
ploop();

// ── TICK MARKS ──
(function(){
  const g=document.getElementById('ticks');
  for(let i=0;i<60;i++){
    const a=(i/60)*Math.PI*2-Math.PI/2,maj=i%5===0;
    const r1=maj?79:83,r2=88;
    const x1=100+r1*Math.cos(a),y1=100+r1*Math.sin(a),x2=100+r2*Math.cos(a),y2=100+r2*Math.sin(a);
    const l=document.createElementNS('http://www.w3.org/2000/svg','line');
    l.setAttribute('x1',x1);l.setAttribute('y1',y1);l.setAttribute('x2',x2);l.setAttribute('y2',y2);
    l.setAttribute('stroke',maj?'rgba(201,169,110,.45)':'rgba(201,169,110,.14)');
    l.setAttribute('stroke-width',maj?'.8':'.4');
    g.appendChild(l);
  }
})();

// ── GAME STATE ──
const LVLS=[
  {name:'Wanderer',xp:0},{name:'Chronicler',xp:50},{name:'Cartographer',xp:130},
  {name:'Sentinel',xp:260},{name:'Luminary',xp:460},{name:'Expedition Lead',xp:750},
  {name:'Paintbreaker',xp:1150},{name:'Eternal',xp:1700}
];
const XPT=15;
let G={
  totalSec:1500,rem:1500,run:false,tmr:null,
  sess:0,telap:0,xp:0,lvl:0,
  hp:100,ap:0,tasks:[],tid:0
};

// ── UI REFS ──
const tdisp=document.getElementById('tdisp'),tsub=document.getElementById('tsub');
const rprog=document.getElementById('rprog');
const stbtn=document.getElementById('stbtn'),psbtn=document.getElementById('psbtn'),rsbtn=document.getElementById('rsbtn');
const imin=document.getElementById('imin'),isec=document.getElementById('isec'),sbtn=document.getElementById('sbtn');
const sgems=document.getElementById('sgems');
const lhex=document.getElementById('lhex'),lnum=document.getElementById('lnum'),lname=document.getElementById('lname');
const hpb=document.getElementById('hpb'),apb=document.getElementById('apb'),xpb=document.getElementById('xpb');
const hpv=document.getElementById('hpv'),apv=document.getElementById('apv'),xpv=document.getElementById('xpv');
const qlist=document.getElementById('qlist'),qin=document.getElementById('qin');
const addbtn=document.getElementById('addbtn'),qcnt=document.getElementById('qcnt'),clrbtn=document.getElementById('clrbtn');
const toastEl=document.getElementById('toast'),luov=document.getElementById('luov');
const lunum=document.getElementById('lunum'),lunm=document.getElementById('lunm');
const selap=document.getElementById('selap'),sdone=document.getElementById('sdone');
const bclk=document.getElementById('bclk');
const ARC=2*Math.PI*85;

// ── CLOCK ──
setInterval(()=>{bclk.textContent=new Date().toTimeString().slice(0,8);},1000);
bclk.textContent=new Date().toTimeString().slice(0,8);

// ── HELPERS ──
function fmt(s){return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');}
function escH(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
let toastT=null;
function showToast(m){toastEl.textContent=m;toastEl.classList.add('on');clearTimeout(toastT);toastT=setTimeout(()=>toastEl.classList.remove('on'),2800);}

function floatXP(x,y,n){
  const e=document.createElement('div');e.className='xpf';
  e.textContent='+'+n+' XP';e.style.left=x+'px';e.style.top=y+'px';
  document.body.appendChild(e);setTimeout(()=>e.remove(),1900);
}
function floatCmp(x,y,txt,col){
  const e=document.createElement('div');e.className='cmpf';
  e.textContent=txt;e.style.left=x+'px';e.style.top=y+'px';e.style.color=col||'var(--hp-green)';
  document.body.appendChild(e);setTimeout(()=>e.remove(),1600);
}

// ── TIMER DISPLAY ──
const SUBS=['Focus','Persist','Endure','Advance','Hold','Onward','Press on','Courage','Remember','Illuminate'];
let subI=0;
function updDisp(){
  tdisp.textContent=fmt(G.rem);
  rprog.style.strokeDashoffset=ARC*(1-G.rem/G.totalSec);
  tdisp.className='tdisp'; rprog.className='rprog';
  const p=G.rem/G.totalSec;
  if(p<=.1){tdisp.classList.add('urg');rprog.classList.add('urg');}
  else if(p<=.25){tdisp.classList.add('warn');rprog.classList.add('warn');}
}
setInterval(()=>{if(G.run){subI=(subI+1)%SUBS.length;tsub.textContent=SUBS[subI];}},42000);

// ── STATS ──
function updStats(){
  hpb.style.width=(G.hp)+'%'; hpv.textContent=Math.round(G.hp);
  apb.style.width=Math.min(100,G.ap)+'%'; apv.textContent=Math.round(G.ap);
  const cl=LVLS[G.lvl],nl=LVLS[G.lvl+1];
  let xpPct=nl?Math.min(100,(G.xp-cl.xp)/(nl.xp-cl.xp)*100):100;
  xpb.style.width=xpPct+'%';
  xpv.textContent=nl?(G.xp+'/'+nl.xp):G.xp;
  lnum.textContent=G.lvl+1; lname.textContent=LVLS[G.lvl].name;
}

function gainXP(amt,x,y){
  G.xp+=amt;
  floatXP(x||innerWidth*.35,y||innerHeight*.4,amt);
  spawnPts(x||innerWidth*.35,y||innerHeight*.4,'rgba(212,168,67,.9)',14);
  let leveled=false;
  while(G.lvl<LVLS.length-1&&G.xp>=LVLS[G.lvl+1].xp){G.lvl++;leveled=true;}
  if(leveled) trigLvl();
  updStats();
}

function trigLvl(){
  lunum.textContent=G.lvl+1; lunm.textContent=LVLS[G.lvl].name;
  lhex.classList.remove('pop'); void lhex.offsetWidth; lhex.classList.add('pop');
  luov.classList.add('on');
  spawnPts(innerWidth/2,innerHeight/2,'rgba(212,168,67,.9)',35);
  spawnPts(innerWidth/2,innerHeight/2,'rgba(201,169,110,.6)',20);
  setTimeout(()=>luov.classList.remove('on'),2900);
  showToast('Level '+(G.lvl+1)+' — '+LVLS[G.lvl].name);
}

// ── SESSION GEMS ──
function updGems(){
  sgems.innerHTML='';
  for(let i=0;i<8;i++){
    const d=document.createElement('div');
    d.className='sgem'+(i<G.sess?' lit':'');
    sgems.appendChild(d);
  }
}
updGems();

// ── TICK ──
function tick(){
  if(G.rem<=0){
    clearInterval(G.tmr); G.run=false;
    G.sess=Math.min(G.sess+1,8);
    // pop the newly lit gem
    const gems=sgems.querySelectorAll('.sgem');
    if(gems[G.sess-1]){gems[G.sess-1].classList.add('pop');}
    updGems();
    G.ap=100; G.hp=Math.min(100,G.hp+18);
    const xpg=Math.round(G.totalSec/60*4);
    gainXP(xpg, innerWidth*.35, innerHeight*.38);
    stbtn.textContent='Begin'; stbtn.disabled=false; psbtn.disabled=true;
    tsub.textContent='Rest';
    showToast('Session complete — the Painter watches');
    G.rem=0; updDisp(); updStats(); return;
  }
  G.rem--; G.telap++;
  G.hp=Math.max(0,G.hp-18/G.totalSec);
  G.ap=Math.min(100,G.ap+100/G.totalSec);
  updDisp(); updStats();
  const e=G.telap;
  selap.textContent=e<60?e+'s':e<3600?Math.floor(e/60)+'m':Math.floor(e/3600)+'h '+Math.floor((e%3600)/60)+'m';
}

// ── CONTROLS ──
stbtn.addEventListener('click',()=>{
  if(G.rem===0) G.rem=G.totalSec;
  G.run=true; G.tmr=setInterval(tick,1000);
  stbtn.textContent='Running…'; stbtn.disabled=true; psbtn.disabled=false;
  tsub.textContent=SUBS[subI];
  const r=document.querySelector('.pring').getBoundingClientRect();
  spawnPts(r.left+r.width/2,r.top+r.height/2,'rgba(201,169,110,.7)',18);
});
psbtn.addEventListener('click',()=>{
  clearInterval(G.tmr); G.run=false;
  stbtn.textContent='Resume'; stbtn.disabled=false; psbtn.disabled=true;
  tsub.textContent='Paused';
});
rsbtn.addEventListener('click',()=>{
  clearInterval(G.tmr); G.run=false;
  G.rem=G.totalSec; G.ap=0; G.hp=Math.min(100,G.hp+8);
  updDisp(); updStats();
  stbtn.textContent='Begin'; stbtn.disabled=false; psbtn.disabled=true;
  tsub.textContent='Focus';
});
sbtn.addEventListener('click',()=>{
  const m=parseInt(imin.value)||0,s=parseInt(isec.value)||0,t=m*60+s;
  if(t<=0)return;
  clearInterval(G.tmr); G.run=false;
  G.totalSec=t; G.rem=t; G.ap=0;
  updDisp(); updStats();
  stbtn.textContent='Begin'; stbtn.disabled=false; psbtn.disabled=true;
  showToast('Timer — '+fmt(t));
});
document.getElementById('prow').addEventListener('click',e=>{
  const b=e.target.closest('.pbtn'); if(!b)return;
  document.querySelectorAll('.pbtn').forEach(x=>x.classList.remove('ap'));
  b.classList.add('ap');
  const s=parseInt(b.dataset.s);
  clearInterval(G.tmr); G.run=false;
  G.totalSec=s; G.rem=s; G.ap=0;
  updDisp(); updStats();
  stbtn.textContent='Begin'; stbtn.disabled=false; psbtn.disabled=true;
  showToast('Timer — '+b.textContent);
});

// ── QUESTS ──
function renderQ(){
  qlist.innerHTML='';
  G.tasks.forEach(t=>{
    const d=document.createElement('div');
    d.className='qi'+(t.done?' done':'');
    d.innerHTML=`<div class="qchk"><div class="qchi"></div></div>
      <div class="qtxt">${escH(t.text)}</div>
      <span class="qxp">+${XPT}</span>
      <div class="qdel" data-id="${t.id}">✕</div>`;
    d.querySelector('.qchk').onclick=()=>togTask(t.id,d);
    d.querySelector('.qtxt').onclick=()=>togTask(t.id,d);
    d.querySelector('.qdel').onclick=ev=>{ev.stopPropagation();delTask(t.id);};
    qlist.appendChild(d);
  });
  const rem=G.tasks.filter(t=>!t.done).length;
  qcnt.textContent=rem===1?'1 remaining':rem+' remaining';
  sdone.textContent=G.tasks.filter(t=>t.done).length;
}

function togTask(id,el){
  const t=G.tasks.find(t=>t.id===id); if(!t)return;
  t.done=!t.done;
  if(t.done){
    el&&el.classList.add('cmp');
    const r=el?el.getBoundingClientRect():{left:innerWidth*.72,top:innerHeight*.5};
    gainXP(XPT,r.left+30,r.top+5);
    floatCmp(r.left,r.top,'✓ Cleared','var(--hp-green)');
    showToast('Objective cleared — glory to the expedition');
    setTimeout(()=>renderQ(),420);
  } else {
    G.xp=Math.max(0,G.xp-XPT); updStats(); renderQ();
  }
}
function delTask(id){G.tasks=G.tasks.filter(t=>t.id!==id);renderQ();}
function addTask(){
  const txt=qin.value.trim(); if(!txt)return;
  G.tasks.push({id:++G.tid,text:txt,done:false});
  qin.value='';
  const r=qin.getBoundingClientRect();
  spawnPts(r.left+r.width/2,r.top,'rgba(201,169,110,.45)',6);
  renderQ();
}
addbtn.onclick=addTask;
qin.addEventListener('keydown',e=>{if(e.key==='Enter')addTask();});
clrbtn.onclick=()=>{G.tasks=G.tasks.filter(t=>!t.done);renderQ();};

// ── MOBILE TABS ──
const layout=document.getElementById('layout');
document.getElementById('ttimer').onclick=()=>{
  layout.classList.remove('sq');
  document.getElementById('ttimer').classList.add('active');
  document.getElementById('tquest').classList.remove('active');
};
document.getElementById('tquest').onclick=()=>{
  layout.classList.add('sq');
  document.getElementById('tquest').classList.add('active');
  document.getElementById('ttimer').classList.remove('active');
};

// ── INIT ──
updDisp(); updStats();
</script>
</body>
</html>
